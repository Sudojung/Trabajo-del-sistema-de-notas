<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel - Sistema de Notas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body onload="cargarPanel()">
  <header class="topbar">
    <div class="logo-small">UNMSM</div>
    <div>
      <h1>Sistema de Notas</h1>
      <p>Panel administrativo</p>
    </div>
    <button onclick="cerrarSesion()">Salir</button>
  </header>

  <main class="dashboard">
    <h2 id="bienvenida">Bienvenido</h2>
    <p class="muted">Seleccione una opción del sistema.</p>

    <div class="grid">
      <a href="notas.html#listar" class="module">Listar alumnos</a>
      <a href="notas.html#buscar" class="module">Buscar alumno</a>
      <a href="notas.html#registrar" class="module">Registrar alumno</a>
      <a href="notas.html#editar" class="module">Editar notas</a>
      <a href="notas.html#eliminar" class="module">Eliminar alumno</a>
      <a href="reporte.html" class="module">Reportes y estadísticas</a>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
