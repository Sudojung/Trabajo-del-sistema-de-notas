<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sistema de Notas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-box">
      <div class="logo-fake">UNMSM</div>
      <h1>Acceso Administrativo</h1>
      <p>Sistema de Notas - UNMSM</p>

      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" placeholder="Ingrese usuario" autocomplete="username" />

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Ingrese contraseña" autocomplete="current-password" />

      <button onclick="loginWeb()">Iniciar sesión</button>
      <p id="mensaje" class="mensaje"></p>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
